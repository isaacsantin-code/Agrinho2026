<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Interativo - Doces & Bolos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🧁 Doces & Delícias</h1>
        <p>Monte o seu pedido personalizado e envie direto para o nosso WhatsApp!</p>
    </header>

    <main>
        <form id="pedidoForm">
            <!-- SEÇÃO DE BOLOS -->
            <section class="menu-section">
                <h2>🎂 Escolha o seu Bolo</h2>
                <div class="input-group">
                    <label for="bolo">Sabor e Tamanho:</label>
                    <select id="bolo">
                        <option value="0" data-nome="Nenhum">Nenhum bolo</option>
                        <option value="85" data-nome="Bolo de Chocolate (1.5kg) - R$ 85,00">Bolo de Chocolate (1.5kg) - R$ 85,00</option>
                        <option value="110" data-nome="Bolo de Morango com Ninho (1.5kg) - R$ 110,00">Bolo de Morango com Ninho (1.5kg) - R$ 110,00</option>
                        <option value="150" data-nome="Bolo Festa Red Velvet (2kg) - R$ 150,00">Bolo Festa Red Velvet (2kg) - R$ 150,00</option>
                    </select>
                </div>
            </section>

            <!-- SEÇÃO DE DOCINHOS -->
            <section class="menu-section">
                <h2>🍬 Centos de Docinhos</h2>
                <p class="dica">Digite a quantidade de centos (ex: 1 = 100 docinhos, 2 = 200 docinhos)</p>
                
                <div class="input-group doces-grid">
                    <div class="doce-item">
                        <label for="brigadeiro">Brigadeiro Tradicional (R$ 70/cento)</label>
                        <input type="number" id="brigadeiro" class="qtd-doce" data-preco="70" data-nome="Cento de Brigadeiro" min="0" placeholder="0">
                    </div>
                    <div class="doce-item">
                        <label for="beijinho">Beijinho de Coco (R$ 70/cento)</label>
                        <input type="number" id="beijinho" class="qtd-doce" data-preco="70" data-nome="Cento de Beijinho" min="0" placeholder="0">
                    </div>
                    <div class="doce-item">
                        <label for="surpresa">Surpresa de Uva (R$ 85/cento)</label>
                        <input type="number" id="surpresa" class="qtd-doce" data-preco="85" data-nome="Cento de Surpresa de Uva" min="0" placeholder="0">
                    </div>
                </div>
            </section>

            <!-- SEÇÃO DE CAIXA/EMBALAGEM -->
            <section class="menu-section">
                <h2>🎁 Embalagem Personalizada</h2>
                <div class="input-group">
                    <label for="embalagem">Tipo de Caixa:</label>
                    <select id="embalagem">
                        <option value="0" data-nome="Caixa Padrão Branca">Caixa Padrão Branca (Grátis)</option>
                        <option value="15" data-nome="Caixa Presente com Laço - R$ 15,00">Caixa Presente com Laço - R$ 15,00</option>
                        <option value="25" data-nome="Caixa Luxo Transparente - R$ 25,00">Caixa Luxo Transparente - R$ 25,00</option>
                    </select>
                </div>
            </section>

            <!-- RESUMO E BOTÃO WHATSAPP -->
            <section class="checkout-section">
                <h2>Resumo do Pedido</h2>
                <div class="total-box">
                    <span>Total Estimado:</span>
                    <strong id="valorTotal">R$ 0,00</strong>
                </div>
                
                <button type="submit" class="btn-whatsapp">
                    📲 Enviar Pedido por WhatsApp
                </button>
            </section>
        </form>
    </main>

    <script src="script.js"></script>
</body>
</html>
